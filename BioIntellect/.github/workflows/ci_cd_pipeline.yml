name: BioIntellect CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov bandit ruff

      - name: Validate Qdrant/Protobuf compatibility
        run: |
          cd backend
          python -c "import google.protobuf; from qdrant_client import QdrantClient; print('protobuf', google.protobuf.__version__)"

      - name: Lint with Ruff
        run: |
          cd backend
          ruff check src/ tests/

      - name: Security scan with Bandit
        run: |
          cd backend
          bandit -r src/ -ll --skip B101,B601

      - name: Run Pytest with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ENVIRONMENT: testing

      - name: Check coverage threshold (80% minimum)
        run: |
          cd backend
          python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); rate = float(root.attrib.get('line-rate', 0)) * 100; print(f'Coverage: {rate:.1f}%'); exit(0 if rate >= 80 else 1)"

  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: NPM audit (security)
        run: |
          cd frontend
          npm audit --audit-level=moderate

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
