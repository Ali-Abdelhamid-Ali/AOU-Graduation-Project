[pytest]
pythonpath = .
testpaths = tests generated_tests
asyncio_mode = auto
filterwarnings =
    ignore:The `gotrue` package is deprecated.*:DeprecationWarning
markers =
    unit: unit-level tests with mocked dependencies
    integration: tests that require Supabase test project credentials
    e2e: ASGI end-to-end tests with lifespan enabled
