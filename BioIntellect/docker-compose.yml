services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biointellect-network

  mri-ai:
    build:
      context: "./AI/brain 3D/brain_seg_deploy"
      dockerfile: Dockerfile
    environment:
      TEMP_DIR: /tmp/biointellect-mri
    restart: unless-stopped
    volumes:
      - mri-models:/app/models
      - mri-outputs:/app/outputs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/', timeout=10)\" || exit 1",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    networks:
      - biointellect-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_CACHING: ${ENABLE_CACHING:-true}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL in BioIntellect/.env}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY in BioIntellect/.env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SSL: "false"
      MRI_SEGMENTATION_SERVICE_URL: http://mri-ai:7860
      MRI_SEGMENTATION_TIMEOUT_SECONDS: ${MRI_SEGMENTATION_TIMEOUT_SECONDS:-300}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      redis:
        condition: service_healthy
      mri-ai:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - backend-logs:/app/logs
      - backend-storage:/app/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=10)\" || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - biointellect-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_ROOT_URL: /api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - biointellect-network

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - biointellect-network

networks:
  biointellect-network:
    driver: bridge

volumes:
  redis-data:
  backend-logs:
  backend-storage:
  mri-models:
  mri-outputs:
