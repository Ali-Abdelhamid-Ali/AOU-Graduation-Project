x-service-defaults: &service-defaults
  init: true
  restart: unless-stopped
  networks:
    - biointellect-network

services:
  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command:
      - redis-server
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "${REDIS_PASSWORD:?Set REDIS_PASSWORD in BioIntellect/.env}"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mri-ai:
    <<: *service-defaults
    build:
      context: "./AI/brain 3D/brain_seg_deploy"
      dockerfile: Dockerfile
    environment:
      TEMP_DIR: /tmp/biointellect-mri
    volumes:
      - mri-models:/app/models
      - mri-outputs:/app/outputs
    # Remove the deploy.resources block entirely if the host has no NVIDIA GPU.
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/', timeout=10)\" || exit 1",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  backend:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Remove the deploy.resources.reservations.devices block if no NVIDIA GPU.
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    env_file:
      - ./.env
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      ENABLE_CACHING: ${ENABLE_CACHING:-true}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL in BioIntellect/.env}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY in BioIntellect/.env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in BioIntellect/.env}
      REDIS_SSL: "false"
      MRI_SEGMENTATION_SERVICE_URL: http://mri-ai:7860
      MRI_SEGMENTATION_TIMEOUT_SECONDS: ${MRI_SEGMENTATION_TIMEOUT_SECONDS:-300}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in BioIntellect/.env}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      redis:
        condition: service_healthy
      mri-ai:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - backend-storage:/app/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8000/health/ready || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    <<: *service-defaults
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_API_ROOT_URL: /api
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  reverse-proxy:
    <<: *service-defaults
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- https://127.0.0.1/health/ready --no-check-certificate >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

networks:
  biointellect-network:
    driver: bridge

volumes:
  redis-data:
  backend-storage:
  mri-models:
  mri-outputs:
